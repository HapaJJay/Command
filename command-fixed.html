<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Command" />
  <title>Command</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Avenir Next", Avenir, Arial, sans-serif; background: #f5f5f7; color: #1c1c1e; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const INITIAL_DATA = {
      areas: [
        { id: "a1", name: "Work", color: "#1a6ef5", icon: "◈" },
        { id: "a2", name: "Health", color: "#12a06e", icon: "◉" },
        { id: "a3", name: "Personal", color: "#7c3aed", icon: "◎" },
      ],
      projects: [
        { id: "p1", areaId: "a1", name: "Q3 Strategy", dueDate: "2026-06-30" },
        { id: "p2", areaId: "a2", name: "Golf Improvement", dueDate: "2026-12-31" },
        { id: "p3", areaId: "a3", name: "Home Renovation", dueDate: "2026-08-15" },
      ],
      columns: [
        { id: "col1", title: "Backlog", limit: null },
        { id: "col2", title: "This Week", limit: 5 },
        { id: "col3", title: "In Progress", limit: 3 },
        { id: "col4", title: "Done", limit: null },
      ],
      tasks: [
        { id: "t1", colId: "col1", projectId: "p1", areaId: "a1", title: "Define OKRs for H2", priority: "high", dueDate: "2026-05-20", today: false, notes: "" },
        { id: "t2", colId: "col2", projectId: "p1", areaId: "a1", title: "Review competitor analysis", priority: "medium", dueDate: "2026-05-10", today: true, notes: "" },
        { id: "t3", colId: "col3", projectId: "p2", areaId: "a2", title: "Book lesson with pro", priority: "low", dueDate: "2026-05-12", today: false, notes: "Check Loch Palm availability" },
        { id: "t4", colId: "col2", projectId: "p3", areaId: "a3", title: "Get contractor quotes", priority: "high", dueDate: "2026-05-15", today: true, notes: "" },
        { id: "t5", colId: "col1", projectId: "p2", areaId: "a2", title: "Research 5-wood options", priority: "medium", dueDate: "2026-05-25", today: false, notes: "Ping G440 Max or Cobra OPTM" },
        { id: "t6", colId: "col4", projectId: "p1", areaId: "a1", title: "Set up project tracking", priority: "low", dueDate: "2026-04-30", today: false, notes: "" },
        { id: "t7", colId: "col3", projectId: "p3", areaId: "a3", title: "Finalize floor plan", priority: "high", dueDate: "2026-05-08", today: true, notes: "" },
        { id: "t8", colId: "col1", projectId: "p1", areaId: "a1", title: "Stakeholder interviews", priority: "medium", dueDate: "2026-06-01", today: false, notes: "" },
      ]
    };

    const PRIORITY_CONFIG = {
      high:   { label: "High",   color: "#e53e3e" },
      medium: { label: "Medium", color: "#d97706" },
      low:    { label: "Low",    color: "#8e8e93" },
    };

    const SF = `-apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Avenir Next", Avenir, Arial, sans-serif`;

    function useLocalStorage(key, initial) {
      const [val, setVal] = useState(() => {
        try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch { return initial; }
      });
      useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
      return [val, setVal];
    }

    function genId() { return Math.random().toString(36).slice(2, 9); }

    function formatDate(d) {
      if (!d) return null;
      const dt = new Date(d + "T00:00:00");
      const now = new Date(); now.setHours(0, 0, 0, 0);
      const diff = Math.round((dt - now) / 86400000);
      if (diff < 0) return { label: `${Math.abs(diff)}d overdue`, overdue: true };
      if (diff === 0) return { label: "Today", today: true };
      if (diff === 1) return { label: "Tomorrow", soon: true };
      if (diff <= 4) return { label: `${diff}d`, soon: true };
      return { label: dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }) };
    }

    function Checkmark({ done, onClick }) {
      return (
        <div onClick={onClick} style={{
          width: 18, height: 18, borderRadius: "50%", flexShrink: 0, cursor: "pointer",
          border: done ? "none" : "1.5px solid #c7c7cc",
          background: done ? "#12a06e" : "transparent",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "all 0.15s",
        }}>
          {done && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.8 7L9 1" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
      );
    }

    const css = `
      input, textarea, select {
        font-family: ${SF}; background: #fff; color: #1c1c1e;
        border: 1px solid #d1d1d6; border-radius: 8px; padding: 7px 10px;
        font-size: 13px; outline: none; width: 100%; transition: border-color .15s, box-shadow .15s;
      }
      input:focus, textarea:focus, select:focus {
        border-color: #1a6ef5; box-shadow: 0 0 0 3px rgba(26,110,245,.1);
      }
      button { cursor: pointer; font-family: ${SF}; border: none; }
      .nav-pill { display: flex; background: #e5e5ea; border-radius: 9px; padding: 2px; }
      .nav-btn { padding: 5px 15px; border-radius: 7px; font-size: 13px; font-weight: 500; color: #6e6e73; background: transparent; transition: all .15s; }
      .nav-btn.active { background: #fff; color: #1c1c1e; box-shadow: 0 1px 3px rgba(0,0,0,.14); }
      .task-card { background: #fff; border: 1px solid #e5e5ea; border-radius: 10px; padding: 11px 13px; cursor: grab; user-select: none; transition: box-shadow .15s, border-color .15s; }
      .task-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.09); border-color: #c7c7cc; }
      .task-card.expanded { border-color: #1a6ef5; box-shadow: 0 0 0 3px rgba(26,110,245,.1); cursor: default; }
      .task-card.dragging { opacity: .4; }
      .col-wrap { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #e5e5ea; background: #f5f5f7; min-width: 0; transition: background .15s; }
      .col-wrap:last-child { border-right: none; }
      .col-wrap.drop-over { background: #eef3ff; }
      .horizon-card { background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 18px; transition: box-shadow .15s; }
      .horizon-card:hover { box-shadow: 0 2px 14px rgba(0,0,0,.07); }
      .stat-box { flex: 1; background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 14px 18px; }
      .today-row { background: #fff; border: 1px solid #e5e5ea; border-radius: 10px; padding: 11px 15px; display: flex; align-items: center; gap: 12px; transition: box-shadow .15s; }
      .today-row:hover { box-shadow: 0 1px 8px rgba(0,0,0,.07); }
      .lbl { font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; display: block; }
      .btn-ghost { background: transparent; color: #6e6e73; border-radius: 7px; padding: 5px 10px; font-size: 12px; }
      .btn-ghost:hover { background: #f2f2f7; color: #1c1c1e; }
      .btn-danger { background: transparent; color: #e53e3e; border-radius: 7px; padding: 5px 10px; font-size: 12px; }
      .btn-danger:hover { background: #fff0f0; }
      .progress-bar { height: 4px; background: #e5e5ea; border-radius: 2px; overflow: hidden; }
      .progress-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
      .fade-up { animation: fadeUp .2s ease both; }
    `;

    function TaskCard({ task, data, expanded, onExpand, onUpdate, onDelete, onDragStart, dragging, onAddProject }) {
      const area = data.areas.find(a => a.id === task.areaId);
      const d = task.dueDate ? formatDate(task.dueDate) : null;
      const isDone = task.colId === "col4";
      const pc = PRIORITY_CONFIG[task.priority];
      return (
        <div className={`task-card fade-up ${dragging?"dragging":""} ${expanded?"expanded":""}`}
          draggable={!expanded} onDragStart={onDragStart}>
          <div style={{ display:"flex", alignItems:"flex-start", gap:9 }}>
            <div style={{ paddingTop:1 }}>
              <Checkmark done={isDone} onClick={() => onUpdate({ colId: isDone ? "col3" : "col4" })} />
            </div>
            <div style={{ flex:1, minWidth:0 }} onClick={onExpand}>
              <div style={{ fontSize:13, fontWeight:500, lineHeight:1.4, color:isDone?"#aeaeb2":"#1c1c1e", textDecoration:isDone?"line-through":"none", wordBreak:"break-word" }}>
                {task.title}
              </div>
              {!expanded && (
                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:5, flexWrap:"wrap" }}>
                  {area && <span style={{ fontSize:11, fontWeight:500, color:area.color }}>{area.icon} {area.name}</span>}
                  {d && <span style={{ fontSize:11, color:d.overdue?"#e53e3e":d.today?"#d97706":d.soon?"#d97706":"#8e8e93" }}>{d.label}</span>}
                  <span style={{ fontSize:11, color:pc?.color }}>● {pc?.label}</span>
                </div>
              )}
            </div>
            <button onClick={e => { e.stopPropagation(); onUpdate({ today: !task.today }); }}
              style={{ background:"none", border:"none", fontSize:15, color:task.today?"#d97706":"#d1d1d6", padding:"0 1px", flexShrink:0, transition:"color .15s" }}>★</button>
          </div>
          {expanded && (
            <div onClick={e => e.stopPropagation()} style={{ marginTop:14, borderTop:"1px solid #f2f2f7", paddingTop:14, display:"flex", flexDirection:"column", gap:12 }}>
              <div style={{ display:"flex", justifyContent:"flex-end", marginTop:-6 }}>
                <button onClick={onExpand} style={{ background:"#f2f2f7", border:"none", borderRadius:6, width:24, height:24, fontSize:14, color:"#8e8e93", cursor:"pointer", lineHeight:1 }}>×</button>
              </div>
              <div><span className="lbl">Title</span><input value={task.title} onChange={e => onUpdate({ title: e.target.value })} /></div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <div>
                  <span className="lbl">Area</span>
                  <select value={task.areaId||""} onChange={e => onUpdate({ areaId: e.target.value })}>
                    {data.areas.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                  </select>
                </div>
                <div>
                  <span className="lbl">Project</span>
                  <select value={task.projectId||""} onChange={e => {
                    if (e.target.value === "__new__") {
                      const name = prompt("New project name:");
                      if (name && name.trim()) {
                        const newId = onAddProject(name.trim(), task.areaId);
                        onUpdate({ projectId: newId });
                      }
                    } else {
                      onUpdate({ projectId: e.target.value });
                    }
                  }}>
                    <option value="">None</option>
                    {data.projects.filter(p => !task.areaId || p.areaId === task.areaId).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                    <option value="__new__">+ New project…</option>
                  </select>
                </div>
                <div>
                  <span className="lbl">Priority</span>
                  <select value={task.priority} onChange={e => onUpdate({ priority: e.target.value })}>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>
                <div>
                  <span className="lbl">Due Date</span>
                  <input type="date" value={task.dueDate||""} onChange={e => onUpdate({ dueDate: e.target.value })} />
                </div>
              </div>
              <div><span className="lbl">Notes</span><textarea value={task.notes||""} onChange={e => onUpdate({ notes: e.target.value })} rows={2} style={{ resize:"none" }} /></div>
              <div>
                <span className="lbl">Move to Column</span>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {data.columns.map(c => (
                    <button key={c.id} onClick={() => onUpdate({ colId: c.id })} style={{
                      fontSize:12, fontWeight:500, padding:"5px 12px", borderRadius:7, border:"none", cursor:"pointer",
                      background: c.id===task.colId?"#1a6ef5":"#f2f2f7",
                      color: c.id===task.colId?"#fff":"#3a3a3c",
                    }}>{c.title}</button>
                  ))}
                </div>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <button className="btn-ghost" onClick={() => onUpdate({ today: !task.today })}>
                  {task.today ? "★ Remove from Today" : "☆ Add to Today"}
                </button>
                <button className="btn-danger" onClick={onDelete}>Delete task</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [data, setData] = useLocalStorage("command-v3", INITIAL_DATA);
      const [view, setView] = useState("kanban");
      const [dragState, setDragState] = useState(null);
      const [dragOver, setDragOver] = useState(null);
      const [expandedTask, setExpandedTask] = useState(null);
      const [filter, setFilter] = useState({ area: null, priority: null, search: "" });

      function updateTask(id, updates) {
        setData(d => ({ ...d, tasks: d.tasks.map(t => t.id === id ? { ...t, ...updates } : t) }));
      }
      function deleteTask(id) {
        setData(d => ({ ...d, tasks: d.tasks.filter(t => t.id !== id) }));
        if (expandedTask === id) setExpandedTask(null);
      }
      function addProject(name, areaId) {
        const id = genId();
        setData(d => ({ ...d, projects: [...d.projects, { id, areaId: areaId||d.areas[0]?.id||null, name, dueDate:"" }] }));
        return id;
      }
      function addTask(colId) {
        const id = genId();
        setData(d => ({
          ...d,
          tasks: [{ id, colId, projectId: d.projects[0]?.id||null, areaId: d.areas[0]?.id||null, title:"New task", priority:"medium", dueDate:"", today:false, notes:"" }, ...d.tasks]
        }));
        setExpandedTask(id);
      }

      const filteredTasks = data.tasks.filter(t => {
        if (filter.area && t.areaId !== filter.area) return false;
        if (filter.priority && t.priority !== filter.priority) return false;
        if (filter.search && !t.title.toLowerCase().includes(filter.search.toLowerCase())) return false;
        return true;
      });

      const todayTasks = data.tasks.filter(t => t.today && t.colId !== "col4");

      return (
        <div style={{ fontFamily:SF, background:"#f5f5f7", height:"100vh", color:"#1c1c1e", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <style>{css}</style>

          {/* Nav */}
          <div style={{ background:"rgba(245,245,247,.92)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderBottom:"1px solid #e5e5ea", padding:"0 18px", display:"flex", alignItems:"center", justifyContent:"space-between", height:52, flexShrink:0, position:"sticky", top:0, zIndex:50 }}>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <span style={{ fontSize:17, fontWeight:700, letterSpacing:"-.025em" }}>Command</span>
              <div style={{ width:1, height:18, background:"#d1d1d6" }} />
              <div className="nav-pill">
                {[["kanban","Kanban"],["today","Today"],["horizon","Horizon"]].map(([v,l]) => (
                  <button key={v} className={`nav-btn ${view===v?"active":""}`} onClick={() => setView(v)}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <input placeholder="Search…" value={filter.search} onChange={e => setFilter(f => ({ ...f, search: e.target.value }))} style={{ width:130 }} />
              <select value={filter.area||""} onChange={e => setFilter(f => ({ ...f, area: e.target.value||null }))} style={{ width:108 }}>
                <option value="">All Areas</option>
                {data.areas.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
              <select value={filter.priority||""} onChange={e => setFilter(f => ({ ...f, priority: e.target.value||null }))} style={{ width:108 }}>
                <option value="">All Priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>

          {/* KANBAN */}
          {view === "kanban" && (
            <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
              {data.columns.map(col => {
                const colTasks = filteredTasks.filter(t => t.colId === col.id);
                const over = dragOver === col.id;
                return (
                  <div key={col.id} className={`col-wrap ${over?"drop-over":""}`}
                    onDragOver={e => { e.preventDefault(); setDragOver(col.id); }}
                    onDrop={e => { e.preventDefault(); if (dragState) updateTask(dragState, { colId: col.id }); setDragState(null); setDragOver(null); }}
                    onDragLeave={() => setDragOver(null)}>
                    <div style={{ padding:"12px 12px 8px", display:"flex", alignItems:"center", gap:7 }}>
                      <span style={{ fontSize:13, fontWeight:600 }}>{col.title}</span>
                      <span style={{ fontSize:11, fontWeight:600, color:"#aeaeb2", background:"#ebebf0", padding:"1px 7px", borderRadius:5 }}>
                        {colTasks.length}{col.limit ? `/${col.limit}` : ""}
                      </span>
                      {col.limit && colTasks.length > col.limit && (
                        <span style={{ fontSize:10, fontWeight:700, color:"#e53e3e", background:"#fff0f0", padding:"1px 6px", borderRadius:4 }}>WIP</span>
                      )}
                      <div style={{ flex:1 }} />
                      {col.id !== "col4" && (
                        <button onClick={() => addTask(col.id)} style={{ background:"none", border:"none", fontSize:22, color:"#aeaeb2", lineHeight:1, padding:"0 2px", borderRadius:5 }}>+</button>
                      )}
                    </div>
                    <div style={{ flex:1, overflowY:"auto", padding:"4px 10px 16px", display:"flex", flexDirection:"column", gap:7 }}>
                      {colTasks.map(task => (
                        <TaskCard key={task.id} task={task} data={data}
                          expanded={expandedTask === task.id}
                          onExpand={() => setExpandedTask(expandedTask === task.id ? null : task.id)}
                          onUpdate={u => updateTask(task.id, u)}
                          onDelete={() => deleteTask(task.id)}
                          onDragStart={e => { setDragState(task.id); e.dataTransfer.effectAllowed="move"; }}
                          dragging={dragState === task.id}
                          onAddProject={addProject}
                        />
                      ))}
                      {colTasks.length === 0 && (
                        <div style={{ textAlign:"center", color:over?"#1a6ef5":"#c7c7cc", fontSize:13, paddingTop:24 }}>
                          {over ? "Drop here" : "Empty"}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* TODAY */}
          {view === "today" && (
            <div style={{ flex:1, overflowY:"auto", padding:"28px 28px", maxWidth:660, margin:"0 auto", width:"100%" }}>
              <div className="fade-up">
                <div style={{ marginBottom:22 }}>
                  <div style={{ fontSize:26, fontWeight:700, letterSpacing:"-.025em" }}>Today's Focus</div>
                  <div style={{ fontSize:14, color:"#8e8e93", marginTop:2 }}>
                    {new Date().toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" })}
                  </div>
                </div>
                <div style={{ display:"flex", gap:10, marginBottom:26 }}>
                  {[["Focused",todayTasks.length,"#1a6ef5"],["In Progress",data.tasks.filter(t=>t.colId==="col3").length,"#d97706"],["Done",data.tasks.filter(t=>t.colId==="col4").length,"#12a06e"]].map(([l,v,c]) => (
                    <div key={l} className="stat-box">
                      <div style={{ fontSize:26, fontWeight:700, color:c, letterSpacing:"-.02em" }}>{v}</div>
                      <div style={{ fontSize:12, fontWeight:500, color:"#8e8e93", marginTop:1 }}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                  <span className="lbl" style={{ marginBottom:0 }}>Focus List</span>
                  <button className="btn-ghost" onClick={() => { const n=data.tasks.find(t=>!t.today&&t.colId!=="col4"); if(n) updateTask(n.id,{today:true}); }}>
                    + Pull from backlog
                  </button>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
                  {todayTasks.length === 0 && (
                    <div style={{ color:"#aeaeb2", fontSize:14, textAlign:"center", padding:"32px 0" }}>
                      Star (★) tasks in Kanban to add them here.
                    </div>
                  )}
                  {todayTasks.map(task => {
                    const area = data.areas.find(a => a.id === task.areaId);
                    const proj = data.projects.find(p => p.id === task.projectId);
                    const isDone = task.colId === "col4";
                    const d = task.dueDate ? formatDate(task.dueDate) : null;
                    return (
                      <div key={task.id} className="today-row" style={{ opacity:isDone?.45:1 }}>
                        <Checkmark done={isDone} onClick={() => updateTask(task.id, { colId: isDone?"col3":"col4" })} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:14, fontWeight:500, color:isDone?"#aeaeb2":"#1c1c1e", textDecoration:isDone?"line-through":"none" }}>{task.title}</div>
                          <div style={{ fontSize:12, color:"#8e8e93", marginTop:1 }}>
                            {proj?.name}{area?" · ":""}{area&&<span style={{ color:area.color, fontWeight:500 }}>{area.name}</span>}
                          </div>
                        </div>
                        {d && <span style={{ fontSize:12, fontWeight:500, flexShrink:0, color:d.overdue?"#e53e3e":d.today?"#d97706":"#8e8e93" }}>{d.label}</span>}
                        <span style={{ fontSize:11, color:PRIORITY_CONFIG[task.priority]?.color, flexShrink:0 }}>● {PRIORITY_CONFIG[task.priority]?.label}</span>
                        <button onClick={() => updateTask(task.id,{today:false})} style={{ background:"none", border:"none", color:"#c7c7cc", fontSize:17, padding:"0 2px" }}>×</button>
                      </div>
                    );
                  })}
                </div>
                <div style={{ marginTop:32 }}>
                  <span className="lbl">Coming Up</span>
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:8 }}>
                    {data.tasks.filter(t=>t.dueDate&&t.colId!=="col4"&&!t.today).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,6).map(task => {
                      const d = formatDate(task.dueDate);
                      const area = data.areas.find(a => a.id === task.areaId);
                      return (
                        <div key={task.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"9px 14px", borderRadius:9, background:"#fff", border:"1px solid #e5e5ea" }}>
                          <span style={{ fontSize:12, fontWeight:600, color:d?.overdue?"#e53e3e":d?.soon?"#d97706":"#8e8e93", minWidth:76, textAlign:"right" }}>{d?.label}</span>
                          <span style={{ fontSize:13, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{task.title}</span>
                          {area && <span style={{ fontSize:12, fontWeight:500, color:area.color, flexShrink:0 }}>{area.name}</span>}
                          <button onClick={() => updateTask(task.id,{today:true})} style={{ background:"none", border:"none", color:"#c7c7cc", fontSize:15, padding:"0 2px" }}>★</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* HORIZON */}
          {view === "horizon" && (
            <div style={{ flex:1, overflowY:"auto", padding:"28px 28px" }}>
              <div className="fade-up">
                <div style={{ marginBottom:26 }}>
                  <div style={{ fontSize:26, fontWeight:700, letterSpacing:"-.025em" }}>The Big Picture</div>
                  <div style={{ fontSize:14, color:"#8e8e93", marginTop:2 }}>Areas · Projects · Progress</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:32 }}>
                  {data.areas.map(area => {
                    const areaProjects = data.projects.filter(p => p.areaId === area.id);
                    const areaTasks = data.tasks.filter(t => t.areaId === area.id);
                    const done = areaTasks.filter(t => t.colId === "col4");
                    const pct = areaTasks.length ? Math.round((done.length/areaTasks.length)*100) : 0;
                    return (
                      <div key={area.id}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                          <span style={{ fontSize:18, color:area.color }}>{area.icon}</span>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:16, fontWeight:700 }}>{area.name}</div>
                            <div style={{ fontSize:12, color:"#8e8e93" }}>{areaTasks.length} tasks · {done.length} done</div>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontSize:18, fontWeight:700, color:area.color }}>{pct}%</div>
                            <div className="progress-bar" style={{ width:80, marginTop:4 }}>
                              <div className="progress-fill" style={{ width:`${pct}%`, background:area.color }} />
                            </div>
                          </div>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))", gap:12 }}>
                          {areaProjects.map(proj => {
                            const pt = data.tasks.filter(t => t.projectId === proj.id);
                            const pd = pt.filter(t => t.colId === "col4");
                            const pp = pt.length ? Math.round((pd.length/pt.length)*100) : 0;
                            const inProg = pt.filter(t => t.colId === "col3");
                            const due = proj.dueDate ? formatDate(proj.dueDate) : null;
                            return (
                              <div key={proj.id} className="horizon-card">
                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                                  <div>
                                    <div style={{ fontSize:14, fontWeight:600 }}>{proj.name}</div>
                                    {due && <div style={{ fontSize:12, color:due.overdue?"#e53e3e":"#8e8e93", marginTop:2 }}>Due {due.label}</div>}
                                  </div>
                                  <span style={{ fontSize:20, fontWeight:700, color:area.color }}>{pp}%</span>
                                </div>
                                <div className="progress-bar" style={{ marginBottom:14 }}>
                                  <div className="progress-fill" style={{ width:`${pp}%`, background:area.color }} />
                                </div>
                                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                                  {pt.slice(0,4).map(t => (
                                    <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8 }}>
                                      <span style={{ fontSize:11, color:t.colId==="col4"?"#12a06e":t.colId==="col3"?"#d97706":"#c7c7cc", flexShrink:0 }}>
                                        {t.colId==="col4"?"✓":t.colId==="col3"?"→":"○"}
                                      </span>
                                      <span style={{ fontSize:13, color:t.colId==="col4"?"#aeaeb2":"#3a3a3c", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", textDecoration:t.colId==="col4"?"line-through":"none" }}>{t.title}</span>
                                      <span style={{ fontSize:10, color:PRIORITY_CONFIG[t.priority]?.color, flexShrink:0 }}>●</span>
                                    </div>
                                  ))}
                                  {pt.length > 4 && <div style={{ fontSize:12, color:"#aeaeb2" }}>+{pt.length-4} more</div>}
                                </div>
                                <div style={{ borderTop:"1px solid #f2f2f7", marginTop:12, paddingTop:10, display:"flex", gap:14, fontSize:12, color:"#8e8e93" }}>
                                  <span>{pd.length}/{pt.length} done</span>
                                  {inProg.length > 0 && <span style={{ color:"#d97706" }}>{inProg.length} in progress</span>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
